---
- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
    state: present
    update_cache: true
  when: docker | default(false) | bool

- name: Ensure ubuntu user is in docker group
  become: true
  user:
    name: ubuntu
    groups: docker
    append: true
  when: docker | default(false) | bool
  