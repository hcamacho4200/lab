- name: Remove enterprise repo
  file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent
  tags: repos

- name: Enable no-subscription repo
  copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/pve {{ proxmox_release }} pve-no-subscription
  tags: repos

- name: Remove enterprise ceph repo
  file:
    path: /etc/apt/sources.list.d/ceph.list
    state: absent
  tags: repos

- name: Enable no-subscription ceph repo
  copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/ceph-reef {{ proxmox_release }} pve-no-subscription
  tags: repos

- name: Disable Proxmox subscription warning
  replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: "\\.data\\.status\\.toLowerCase\\(\\) !== 'active'"
    replace: ".data.status.toLowerCase() == 'active'"
  notify: Restart pveproxy



